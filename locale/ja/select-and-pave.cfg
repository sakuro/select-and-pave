[mod-name]
select-and-pave=Select & Pave

[mod-description]
select-and-pave=舗装用アイテム(石レンガ・コンクリート・埋立地など)を持って範囲選択すると、対応するタイルのゴーストを配置します。

[shortcut-name]
select-and-pave-activate=選択範囲を舗装

[shortcut-description]
select-and-pave-activate=範囲をドラッグ選択すると、持っているアイテムで舗装します。

[controls]
select-and-pave-activate-input=選択範囲を舗装
select-and-pave-next-item=選択範囲を舗装: 次のアイテム
select-and-pave-previous-item=選択範囲を舗装: 前のアイテム

[mod-setting-name]
select-and-pave-after-selection=選択後の手持ち

[mod-setting-description]
select-and-pave-after-selection=範囲選択後に何を手に持つか: 選択ツールを保持して続けてドラッグ(__CONTROL__clear-cursor__ で手放すと元のアイテムが戻ります)、すぐに元のアイテムへ持ち替え、または手を空にします。

[string-mod-setting]
select-and-pave-after-selection-keep-tool=引き続きツールを保持
select-and-pave-after-selection-restore-item=元のアイテムを持つ
select-and-pave-after-selection-clear-cursor=手放す

[select-and-pave-messages]
no-paving-item=舗装用アイテムを持ってください
not-yet-researched=このアイテムはまだ研究されていません
now-paving=__1__ __2__ で舗装します
now-paving-underlay=__1__ __2__ で埋め立てます
