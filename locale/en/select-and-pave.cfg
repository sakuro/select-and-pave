[mod-name]
select-and-pave=Select & Pave

[mod-description]
select-and-pave=Hold a paving item (stone brick, concrete, landfill, etc.), drag-select an area, and place matching tile ghosts for construction.

[shortcut-name]
select-and-pave-activate=Pave Selection

[shortcut-description]
select-and-pave-activate=Drag-select an area to pave it with the item in your hand.

[controls]
select-and-pave-activate-input=Pave Selection
select-and-pave-next-item=Pave Selection: Next Item
select-and-pave-previous-item=Pave Selection: Previous Item

[mod-setting-name]
select-and-pave-after-selection=Behavior after selection
select-and-pave-protected-items=Protected paving items

[mod-setting-description]
select-and-pave-after-selection=What to hold after paving a selection: keep the selection tool for another drag (press __CONTROL__clear-cursor__ to put it away), get the paving item back, or empty the hand.
select-and-pave-protected-items=Comma-separated item names (e.g. artificial-yumako-soil) whose resulting tiles are never overwritten by paving with a different item, even where that would otherwise be a valid placement. Leave blank to protect nothing.

[string-mod-setting]
select-and-pave-after-selection-keep-tool=Keep the tool
select-and-pave-after-selection-restore-item=Get the paving item back
select-and-pave-after-selection-clear-cursor=Empty the hand

[select-and-pave-messages]
no-paving-item=Hold a paving item first
not-yet-researched=This item hasn't been researched yet
now-paving=Paving with __1__ __2__
now-paving-underlay=Filling with __1__ __2__
unknown-protected-item=Ignoring unknown protected item "__1__" (not a paving item)
