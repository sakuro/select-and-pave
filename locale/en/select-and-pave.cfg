[mod-name]
select-and-pave=Select & Pave

[mod-description]
select-and-pave=Hold a paving item (stone brick, concrete, landfill, etc.), drag-select an area, and place matching tile ghosts for construction.

[shortcut-name]
select-and-pave-activate=Pave Selection

[shortcut-description]
select-and-pave-activate=Drag-select an area to pave it with the item in your hand.

[controls]
select-and-pave-activate-input=Pave Selection
select-and-pave-next-item=Pave Selection: Next Item
select-and-pave-previous-item=Pave Selection: Previous Item

[mod-setting-name]
select-and-pave-keep-tool=Keep tool after selection

[mod-setting-description]
select-and-pave-keep-tool=After paving a selection, keep the selection tool in hand for another drag. Press __CONTROL__clear-cursor__ to put it away and get the paving item back. When disabled, the tool is put away after every selection.

[select-and-pave-messages]
no-paving-item=Hold a paving item first
not-yet-researched=This item hasn't been researched yet
now-paving=Paving with __1__ __2__
now-paving-underlay=Filling with __1__ __2__
